esphome:
  name: "${name}"
  comment: "${device_description}"
  area: "${room}"

#-------------------------------------------
# BINARY SENSOR
#-------------------------------------------
binary_sensor:
  - platform: status
    name: "API HA"
    id: system_status  
    icon: mdi:check-network-outline
    
#-------------------------------------------
# BUTTON
#-------------------------------------------    
button:
  - platform: restart
    name: "Restart"
    id: restart_button
#-------------------------------------------
# SENSOR
#-------------------------------------------
sensor:
  - platform: uptime
    name: "uptime"
    

