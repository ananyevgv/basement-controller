### JP1 ###
#
# GPIO16	RS232 TX
# GPIO17	RS232 RX
#
# GND
###########

### P3 ### SSD1306
# GND
# 3V3
# GPIO15	I2C SCL
# GPIO4	  I2C SDA
###########

### P4 ##############   ## xdb401 ##
# 3V3                      Brown
# GND                      Blue
# GPIO15	I2C SCL          Black
# GPIO4	  I2C SDA          White
######################  ##        ##

     ######
##### RJ12 ######
#   б  к  з  ж  #
#   е  р  е  е  #
#   л  а  л  л  #
#   ы  с  е  т  #
#   й  н  н  ы  #
#      ы  ы  й  #
#      й  й     #
#################

############## P6 ##############
# 3V3                                     отрезать 3V3 подать 5V
# GPIO32	1-Wire GPIO IO-1                удалить R23 замкнуть 24 + резистор на корпус 100 ом leack
# GPIO33	1-Wire GPIO IO-2                удалить R31 замкнуть 32 + резистор на корпус 100 ом leack
# GND
# GPIO26	Analog output DA1               buzzer
# GPIO25	Analog output DA2
# GND
#################################

############## P7 ##############
# GND
# GPIO36	Analog input A1                 current pump
# GPIO39	Analog input A2
# GPIO34	Analog input A3
# GPIO35	Analog input A4
#################################

########### P8 pcf8574 ###########
# input D0
# input D1
# input D2                                valve close
# input D3                                valve open
# input D4                                water 
# input D5
# GND
#################################

### P10 ###
# RS485 B 
# RS485 A
#----------
# GPIO27 TX 
# GPIO14 RX 
###########

### P17 ###
# GND
# 3V3
# GPIO12                                  toggle relay
# GPIO13                                  toggle valve
###########

############################### U2 LoRa ################################ 
# GND                Pin1  = GND   | 
# MISO(SDO)  GPIO19  Pin14 = DC    | 
# MOSI(SDI)  GPIO23  Pin5  = MOSI  | # GPIO2 
# CLK        GPIO18  Pin4  = SCLK  | # 3V3                  Pin2  = Vcc
# CS         GPIO5	 Pin16 = CS    | 
# RST        GPIO21  Pin15 = RST   | 
#                                  | # GND
# GND                              | 
#######################################################################

############################  P2 nRF24L01 ############################# 
# GND                 Pin1  = GND  | # 3V3                  Pin2  = Vcc
# RES? 10к 3.3В	      Pin15 = RST  | # CS    GPIO5	        Pin16 = CS
# CLK   GPIO18        Pin4  = SCLK | # MOSI(SDI)  GPIO23    Pin5  = MOSI
# MISO  GPIO19        Pin14 = DC   | 
#######################################################################

substitutions:
  name: "basement-water"
  lastname: APC
  room: "Подвал"
  device_description: "Контроллер подвала"

esphome:
  platformio_options:
    board_build.f_flash: 80000000L
  #environment_variables:
  #  ALL_PROXY: http://esphome:HG5hgd763kjsh@45.141.102.158:1971

esp32:
  board: esp32dev
  cpu_frequency: 240MHZ
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1" 
      sram1_as_iram: true

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

i2c:
  sda: GPIO4
  scl:
    number: GPIO15
    ignore_strapping_warning: true
  sda_pullup_enabled: False
  scl_pullup_enabled: False
  scan: true
  
#-------------------------------------------
# Packages
#------------------------------------------- 
packages:
  wifi: !include packages/wifi.yaml
  device_base: !include packages/device_base.yaml
 # web: !include included/web.yaml
  time: !include included/time.yaml
  xdb401: !include packages/sensor/xdb401.yaml
  apc: !include 
    file: packages/apc.yaml
    vars:
      TX_APC: 17
      RX_APC: 16
  bme680_bsec: !include 
    file: packages/sensor/bme680_bsec2.yaml
    vars:
      id_bme680_t: bme680_t
      id_bme680_h: bme680_h
      id_bme680_p: bme680_p
      id_bme680_iaq: bme680_iaq
      id_bme680_co2: bme680_co2
      id_bme680_voc: bme680_voc
      model_bme: bme688
      address_bme680: 0x77
      t_offset: 0

#-------------------------------------------
# PCF8574
#-------------------------------------------
pcf8574:
  - id: inputs
    address: 0x22
  - id: outputs
    address: 0x24

#-------------------------------------------
# OUTPUT
#-------------------------------------------
output:
  - platform: ledc
    pin: 26
    id: buzzer

#-------------------------------------------
# RTTTL
#-------------------------------------------
rtttl:
  output: buzzer
  gain: 60%

#-------------------------------------------
# INTERVAL
#-------------------------------------------
interval:
  - interval: 1s
    then:
      if:
        condition:
          or:
            - binary_sensor.is_on: leak_input0
            - binary_sensor.is_on: leak_input1
            - binary_sensor.is_on: water
        then:
          if:
            condition:
              not:
                rtttl.is_playing
            then:
           #    rtttl.play: 'DoomLev1:d=32,o=5,b=56:f,f,f6,f,f,d#6,f,f,c#6,f,f,b,f,f,c6,c#6,f,f,f6,f,f,d#6,f,f,c#6,f,f,8b.,f,f,f6,f,f,d#6,f,f,c#6,f,f,b,f,f,c6,c#6,f,f,f6,f,f,d#6,f,f,c#6,f,f,8b.,a#,a#,a#6,a#,a#,g#6,a#,a#,f#6,a#,a#,e6,a#,a#,f6,f#6,a#,a#,a#6,a#,a#,g#6,a#,a#,f#6,a#,a#,8e6'
           #    rtttl.play: 'Kombat:d=4,o=6,b=35:32a#5,32a#5,32c#6,32a#5,32d#6,32a#5,32f6,32d#6,32c#6,32c#6,32f6,32c#6,32g#6,32c#6,32f6,32c#6,32g#5,32g#5,32c6,32g#5,32c#6,32g#5,32d#6,32c#6,32f#5,32f#5,32a#5,32f#5,32c#6,32f#5,32c#6,32c6,32a#5,32a#5,32c#6,32a#5,32d#6,32a#5,32f6,32d#6,32c#6,32c#6,32f6,32c#6,32g#6,32c#6,32f6,32c#6,32g#5,32g#5,32c6,32g#5,32c#6,32g#5,32d#6,32c#6,32f#5,32f#5,32a#5,32f#5,32c#6,32f#5,32c#6,32c6'
              rtttl.play: 'Badinerie:d=16,o=6,b=125:8b,d7,b,8f#,b,f#,8d,f#,d,4b5,f#5,b5,d,b5,c#,b5,c#,b5,a#5,c#,e,c#,8d,8b5,8b,d7,b,8f#,b,f#,8d,f#,d,4b5,8d,8d,8d,8d,8b,8d,32d,32c#,32d,32c#,8c#,8f#,8f#,8f#,8f#,8d7,8f#,32f#,32f,32f#,32f,8f,c#,f#,a,f#,g#,f#,g#,f#,f,g#,b,g#,a,g#,a,g#,f#,a,f#,f,f#,b,f#,f,f#,c#7,f#,f,f#,d7,f#,f,f#,d7,c#7,b,c#7,a,g#,f#,8a,8g#,4f#'
        else:
          rtttl.stop

#-------------------------------------------
# VALVE
#-------------------------------------------
valve:
  - platform: template
    name: "water valve"
    id: water_valve
    device_class: water
    lambda: |-
      if (id(b_water_close).state) {
        return VALVE_CLOSED;
      } else {
        if (id(b_water_open).state) {
          return VALVE_OPEN;
        } 
      }
    open_action:
      then:
        - switch.turn_on: water_open
    close_action:
      then:
        - switch.turn_on: water_close
    stop_action:
      then:
        - switch.turn_off: water_close
        - switch.turn_off: water_open

#-------------------------------------------
# BINARY SENSOR
#-------------------------------------------
binary_sensor:
  - platform: gpio
    id: toggle_relays
#    name: toggle_relays
    device_class: plug
    internal: true
    pin:
      number: 12

      mode: INPUT_PULLDOWN
    filters:
      - delayed_off: 10ms
    on_multi_click:
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - lambda: |-  
              id(relays_toggle).execute();
      - timing:
          - ON for at least 1s
        then:
          - lambda: |-
              id(off_relays).execute();
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - lambda: |-  
              id(on_relays).execute();

  - platform: gpio
 #   name: Toggle_valve
    id: toggle_valve
    icon: mdi:water-pump
    pin:
      number: 13
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_off: 10ms
    on_press: 
      - if:
          condition:
            lambda: 'return id(water_valve).position == 0.0;'
          then:
            - valve.open: water_valve
          else:
            - valve.close: water_valve

  - platform: analog_threshold
    sensor_id: adc_leak0
    threshold: 0.4
    id: leak_input0
    name: "leak0 input"
    on_press:
      - valve.close: water_valve

  - platform: analog_threshold
    sensor_id: adc_leak1
    threshold: 0.4
    id: leak_input1
    name: "leak1 input"
    on_press:
      - valve.close: water_valve

  - platform: gpio
    name: "water!"
    device_class: moisture
    id: water
    pin:
      pcf8574: inputs
      number: 5
      mode: INPUT
      inverted: true

# бинарный сенсор по току
  - platform: analog_threshold
    name: "pump"
    sensor_id: pump_current
    device_class: plug
    threshold: 0.2
    id: pump
    on_press:
      then:
        - sensor.template.publish:                                                                                                                                           
            id: pump_on                                                                                                                                                   
            state: !lambda 'return id(sntp_time).now().timestamp;'
    on_release:
      then:
        - number.set:
            id: counter
            value: !lambda |-
              return ((id(counter).state)+1);
        - sensor.template.publish:                                                                                                                                                                                                                                                                              
            id: pump_off                                                                                                                                                 
            state: !lambda 'return id(sntp_time).now().timestamp;'

  - platform: gpio
    id: b_water_open
    #name: b_water_open
    pin:
      pcf8574: inputs
      number: 3
      mode: INPUT
      inverted: true
    on_press:
      - switch.turn_off: water_open
  - platform: gpio
    id: b_water_close
    #name: b_water_close
    pin:
      pcf8574: inputs
      number: 4
      mode: INPUT
      inverted: true
    on_press:
      - switch.turn_off: water_close

#-------------------------------------------
# SWITCH
#-------------------------------------------
switch:
  - platform: gpio
    name: "Лаборатория"
    id: relay_1
    icon: mdi:lightning-bolt-circle
    restore_mode: RESTORE_DEFAULT_OFF
    pin:
      pcf8574: outputs
      number: 0
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Шкафы"
    id: relay_2
    icon: mdi:window-open-variant
    restore_mode: RESTORE_DEFAULT_OFF
    pin:
      pcf8574: outputs
      number: 1
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Кладовка"
    icon: mdi:fridge-outline
    id: relay_3
    restore_mode: RESTORE_DEFAULT_OFF
    pin:
      pcf8574: outputs
      number: 2
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "Серверная"
    id: relay_4
    icon: mdi:nas
    restore_mode: RESTORE_DEFAULT_OFF
    pin:
      pcf8574: outputs
      number: 3
      mode: OUTPUT
      inverted: true

# Вода
  - platform: gpio
    id: water_close
    pin:
      pcf8574: outputs
      number: 4
      mode: OUTPUT
      inverted: true
  - platform: gpio
    id: water_open
    pin:
      pcf8574: outputs
      number: 5
      mode: OUTPUT
      inverted: true

#-------------------------------------------
# SENSOR
#-------------------------------------------
sensor:
  - platform: homeassistant
    id: schetchik_vody
    entity_id: sensor.schetchik_vody_svd_20_0022517_pokazaniia
  - platform: homeassistant
    id: schetchik_batareia
    entity_id: sensor.schetchik_vody_svd_20_0022517_batareia

  - platform: adc
    pin: 36 #2
    id: adc_sensor
    attenuation: auto
   # name: adc_sensor_current
    update_interval: 5s

  - platform: adc
    pin: 32
    id: adc_leak0
    update_interval: 5s
    attenuation: auto

  - platform: adc
    pin: 33
    id: adc_leak1
    update_interval: 5s
    attenuation: auto

  - platform: ct_clamp
    sensor: adc_sensor
    name: "pump current"
    id: pump_current
    update_interval: 5s

  - platform: template
    name: "time pump off"
    device_class: timestamp
    id: pump_off
    update_interval: never

  - platform: template
    name: "time pump on"
    device_class: timestamp
    id: pump_on
    update_interval: never

  - platform: template
    name: "pump working"
    lambda: |-
      return id(counter).state;
    accuracy_decimals: 0
    icon: mdi:counter

  - platform: duty_time
    id: pump_work_time
    name: pump Work Time
    sensor: pump
    restore: false
    last_time:
      name: pump Turn-On Time
      id: pump_turn_on_time

#-------------------------------------------
# NUMBER
#-------------------------------------------
number:
  - platform: template
    name: Counter
    id: counter
    update_interval: 30s
    min_value: 0
    max_value: 200                            
    step: 0
    optimistic: true 
    initial_value: 0
    internal: true

#-------------------------------------------
# TIME
#-------------------------------------------
time:
  - platform: ds1307
    id: rtc_time
  - id: !extend sntp_time
    on_time: 
      - hours: 0
        minutes: 0
        seconds: 0
        then:
          - number.set:
              id: counter
              value: 0

#-------------------------------------------
# DISPLAY
#-------------------------------------------
display:
  - platform: ili9xxx
    id: clock_display_1
    model: st7789v
   # rotation: 180
    dimensions:
      height: 320
      width: 170
      offset_height: 0
      offset_width: 35
    invert_colors: True
    update_interval: 0.1s
    cs_pin: 5 
    dc_pin: 19 
    lambda: |-
      // Выводим уровень Wi-Fi
      uint16_t var = (id(wifi_signal_percent).state);
      switch (var) {
        case 0 ... 24: it.image(125, 5, id(i_wifi1), red); break;
        case 25 ... 49: it.image(125, 5, id(i_wifi2), yellow); break;
        case 50 ... 74: it.image(125, 5, id(i_wifi3), lgreen); break;
        case 75 ... 100: it.image(125, 5, id(i_wifi4), green); break;
        default: it.image(125, 5, id(i_wifioff), red); break;
      }

      // Выводим состояние крана
      if (id(water_valve).position == VALVE_OPEN) {
        it.image(0, 5, id(i_water_on), blue);
        } else if (id(water_valve).position == VALVE_CLOSED) {
        it.image(0, 5, id(i_water_off), green);
        } else {
        it.image(0, 5, id(i_water_opening), red);
        }

      // Выводим состояние датчиков протечки
      if ( id(leak_input0).state | id(leak_input1).state ) {
        it.image(30, 5, id(i_water_alert), red);
        }
      if (id(water).state) {
        it.image(65, 5, id(i_level), red);
        }

      // Выводим показания счетчик температуру и давление воды
      it.image(30, 35, id(i_counter), blue);
      it.printf(55, 35, id(font1), blue, "%5.0fm³", id(schetchik_vody).state);

      it.image(0, 70, id(i_gauge), blue);
      it.printf(35, 70, id(font1), blue, "%.1f", id(water_p).state);

      it.image(80, 70, id(i_thermometer_water), green);
      it.printf(115, 70, id(font1), green, "%2.0f°", id(water_t).state);

      if (id(pump).state) {
        it.image(0, 110, id(i_pump_on), red);
        it.printf(35, 110, id(font1), white, "%i", id(counter).state);
      }
      else {
        it.image(0, 110, id(i_pump_off), white);
        it.printf(35, 110, id(font1), white, "%.0f", id(counter).state);
      }
      it.image(74, 110, id(i_battery), green);
      it.printf(105, 110, id(font1), green, "%3.0f%%", id(schetchik_batareia).state);

      it.line(0, 145, 170, 145, yellow);

      // Выводим APC
      if ((id(grid_voltage).state) == 0) {
        id(gtower).next_frame();
        it.image(0, 150, id(gtower));
      }
      else
        it.image(0, 150, id(i_wave));
      it.printf(35, 150, id(font1), "%.0fv %.0f%%" , id(grid_voltage).state, id(state_charge).state);

      it.line(0, 185, 170, 185, yellow);

      // Выводим bme680
      uint16_t vt = (id(bme680_t).state);
      switch (vt) {
        case 0 ... 22: 
          it.image(0, 190, id(i_thermometer), blue);
          it.printf(35, 190, id(font1), blue, "%2.0f°", id(bme680_t).state);
          break;
        case 23 ... 25: 
          it.image(0, 190, id(i_thermometer), green);
          it.printf(35, 190, id(font1), green, "%2.0f°", id(bme680_t).state);
          break;
        case 26 ... 28: 
          it.image(0, 190, id(i_thermometer), yellow);
          it.printf(35, 190, id(font1), yellow, "%2.0f°", id(bme680_t).state);
          break;
        case 29 ... 35: 
          it.image(0, 190, id(i_thermometer), red);
          it.printf(35, 190, id(font1), red, "%2.0f°", id(bme680_t).state);
          break;
        default: 
          it.image(0, 190, id(i_thermometer), tred);
          it.printf(35, 190, id(font1), tred, "%2.0f°", id(bme680_t).state);
          break;
      }
      uint16_t vh = (id(bme680_h).state);
      switch (vh) {
        case 0 ... 30: 
          it.image(80, 190, id(i_water_percent), red);
          it.printf(110, 190, id(font1), red, "%3.f%%", id(bme680_h).state);
          break;
        case 31 ... 50: 
          it.image(80, 190, id(i_water_percent), yellow);
          it.printf(110, 190, id(font1), yellow, "%3.0f%%", id(bme680_h).state);
          break;
        case 51 ... 60: 
          it.image(80, 190, id(i_water_percent), green);
          it.printf(110, 190, id(font1), green, "%3.0f%%", id(bme680_h).state);
          break;
        case 61 ... 70: 
          it.image(80, 190, id(i_water_percent), yellow);
          it.printf(110, 190, id(font1), yellow, "%3.0f%%", id(bme680_h).state);
          break;
        case 71 ... 100: 
          it.image(80, 190, id(i_water_percent), blue);
          it.printf(110, 190, id(font1), blue, "%3.0f%%", id(bme680_h).state);
          break;
        default: 
          it.image(80, 190, id(i_water_percent), tred);
          it.printf(110, 190, id(font1), tred, "%3.0f%%", id(bme680_h).state);
          break;
      }

      uint16_t viaq = (id(bme680_iaq).state);
      switch (viaq) {
        case 0 ... 50: 
          it.image(85, 230, id(i_IAQ), green);
          it.printf(110, 230, id(font1), green, "%3.0f", id(bme680_iaq).state);
          break;
        case 51 ... 100: 
          it.image(85, 230, id(i_IAQ), green);
          it.printf(110, 230, id(font1), green, "%3.0f", id(bme680_iaq).state);
          break;
        case 101 ... 150: 
          it.image(85, 230, id(i_IAQ), lgreen);
          it.printf(110, 230, id(font1), lgreen, "%3.0f", id(bme680_iaq).state);
          break;
        case 151 ... 200: 
          it.image(85, 230, id(i_IAQ), yellow);
          it.printf(110, 230, id(font1), yellow, "%3.0f", id(bme680_iaq).state);
          break;
        case 201 ... 250: 
          it.image(85, 230, id(i_IAQ), lyellow);
          it.printf(110, 230, id(font1), lyellow, "%3.0f", id(bme680_iaq).state);
          break;
        case 251 ... 300: 
          it.image(85, 230, id(i_IAQ), red);
          it.printf(110, 230, id(font1), red, "%3.0f", id(bme680_iaq).state);
          break;
        case 301 ... 350: 
          it.image(85, 230, id(i_IAQ), tred);
          it.printf(110, 230, id(font1), tred, "%3.0f", id(bme680_iaq).state);
          break;
        case 351 ... 500: 
          it.image(85, 230, id(i_IAQ), tred);
          it.printf(110, 230, id(font1), tred, "%3.0f", id(bme680_iaq).state);
          break;
        default: 
          it.image(85, 230, id(i_IAQ), blue);
          it.printf(110, 230, id(font1), blue, "%3.0f", id(bme680_iaq).state);
          break;
      }

      uint16_t vp = (id(bme680_p).state * 0.75);
      switch (vp) {
        case 710 ... 730: 
          it.image(0, 230, id(i_weather_pouring), blue);
          it.printf(35, 230, id(font1), red, "%3.0f", id(bme680_p).state * 0.75);
          break;
        case 731 ... 740: 
          it.image(0, 230, id(i_weather_pouring), blue);
          it.printf(35, 230, id(font1), yellow, "%3.0f", id(bme680_p).state * 0.75);
          break;
        case 741 ... 760: 
          it.image(0, 230, id(i_cloud_outline), white);
          it.printf(35, 230, id(font1), green, "%3.0f", id(bme680_p).state * 0.75);
          break;
        case 761 ... 770: 
          it.image(0, 230, id(i_white_balance_sunny), yellow);
          it.printf(35, 230, id(font1), yellow, "%3.0f", id(bme680_p).state * 0.75);
          break;
        case 771 ... 780: 
          it.image(0, 230, id(i_white_balance_sunny), yellow);
          it.printf(35, 230, id(font1), red, "%3.0f", id(bme680_p).state * 0.75);
          break;
        default: 
          it.image(0, 230, id(i_white_balance_sunny), tred);
          it.printf(35, 230, id(font1), tred, "%3.0f", id(bme680_p).state * 0.75);
          break;
      }

      it.line(0, 270, 170, 270, yellow);

      // Выводим состояние выключателей
      if (id(relay_1).state) {
        it.image(5, 280, id(i_laba), yellow);
        }
      else {
